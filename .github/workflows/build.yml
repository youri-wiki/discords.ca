name: Build Nuxt App (Self-hosted)

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Deploy files
        run: |
          APP_DIR=/home/youri/apps/discords.ca

          mkdir -p "$APP_DIR"

          rsync -av "$GITHUB_WORKSPACE/" "$APP_DIR/"

          cd "$APP_DIR"
          npm ci
          npm run build

          # run in background
          nohup node .output/server/index.mjs > app.log 2>&1 &
